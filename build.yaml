overview: "Group policy templates, display and playback preferences, account lifecycle, password hygiene, and easier user onboarding for Jellyfin."
description: >
  User Management provides user groups and password hygiene to accounts that already exist on your
  Jellyfin server. Define group templates that manage both permissions and display and playback
  preferences with live sync, set account expiry and auto-disable inactive users, and enforce password
  requirements. Use these groups to send user-managed, and protected invite links.
